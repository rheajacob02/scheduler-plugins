# AppGroup for Online Boutique (matches CRD: spec.workloads with workload+selector)
# Workload names/selectors must match deploy labels: appgroup.diktyo.x-k8s.io.workload: <name>
apiVersion: appgroup.diktyo.x-k8s.io/v1alpha1
kind: AppGroup
metadata:
  name: online-boutique
  namespace: default
spec:
  numMembers: 11
  topologySortingAlgorithm: KahnSort
  workloads:
    - workload:
        kind: Deployment
        name: adservice
        selector: adservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: cartservice
        selector: cartservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: checkoutservice
        selector: checkoutservice
        apiVersion: apps/v1
        namespace: default
      dependencies:
        - workload:
            kind: Deployment
            name: cartservice
            selector: cartservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: currencyservice
            selector: currencyservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: shippingservice
            selector: shippingservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: productcatalogservice
            selector: productcatalogservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
    - workload:
        kind: Deployment
        name: currencyservice
        selector: currencyservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: emailservice
        selector: emailservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: frontend
        selector: frontend
        apiVersion: apps/v1
        namespace: default
      dependencies:
        - workload:
            kind: Deployment
            name: productcatalogservice
            selector: productcatalogservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: recommendationservice
            selector: recommendationservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: cartservice
            selector: cartservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: currencyservice
            selector: currencyservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: shippingservice
            selector: shippingservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
        - workload:
            kind: Deployment
            name: checkoutservice
            selector: checkoutservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
    - workload:
        kind: Deployment
        name: paymentservice
        selector: paymentservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: productcatalogservice
        selector: productcatalogservice
        apiVersion: apps/v1
        namespace: default
      dependencies: []
    - workload:
        kind: Deployment
        name: recommendationservice
        selector: recommendationservice
        apiVersion: apps/v1
        namespace: default
      dependencies:
        - workload:
            kind: Deployment
            name: productcatalogservice
            selector: productcatalogservice
            apiVersion: apps/v1
            namespace: default
          maxNetworkCost: 10
    - workload:
        kind: Deployment
        name: redis-cart
        selector: redis-cart
        apiVersion: apps/v1
        namespace: default
      dependencies: []
