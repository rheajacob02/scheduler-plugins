# Prefer kubescheduler.config.k8s.io/v1: many current kube-scheduler binaries no longer
# register v1beta3 (you would see: no kind "KubeSchedulerConfiguration" is registered for version "v1beta3").
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-aware-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: false
    profiles:
      - schedulerName: network-aware-scheduler
        plugins:
          multiPoint:
            enabled:
              - name: NetworkOverhead
                weight: 5
            disabled:
              - name: NodeResourcesFit
          queueSort:
            enabled:
              - name: TopologicalSort
            disabled:
              - name: "*"
        pluginConfig:
          - name: TopologicalSort
            args:
              namespaces:
                - "default"
          - name: NetworkOverhead
            args:
              namespaces:
                - "default"
              weightsName: "UserDefined"
              networkTopologyName: "net-topology-test"
